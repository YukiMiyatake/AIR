[package]
name = "airc"
description = "AIR Phase 1+ toolchain (Rust) — parse/check/run and later native codegen"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "airc"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
