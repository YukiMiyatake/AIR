name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (TS)
        run: npm ci

      - name: Build (TS)
        run: npm run build

      - name: Test (TS)
        run: npm test

      - name: CLI smoke (TS)
        run: |
          set +e
          npm run airc -- run examples/sum.air.json
          code=$?
          set -e
          # sum.air.json returns 55; that is the process status (PHASE1_DECISIONS), not a CLI failure.
          test "$code" -eq 55
          # ownership negative: use-after-move must fail check
          set +e
          npm run airc -- check examples/bad_move.air.json
          code=$?
          set -e
          test "$code" -ne 0
          # hosted stdout: first line from cap.print (CLI also echoes return value after)
          out=$(npm run -s airc -- run examples/hello.air.json)
          printf '%s\n' "$out" | head -n1 | grep -qx 'hello'

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: Test (Rust)
        run: cargo test --workspace

      - name: CLI smoke (Rust)
        run: |
          set +e
          cargo run -q -p airc -- run examples/sum.air.json
          code=$?
          set -e
          test "$code" -eq 55
          set +e
          cargo run -q -p airc -- check examples/bad_move.air.json
          code=$?
          set -e
          test "$code" -ne 0
          out=$(cargo run -q -p airc -- run examples/hello.air.json)
          printf '%s\n' "$out" | head -n1 | grep -qx 'hello'

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose build dev

      - name: Rust version in container
        run: docker compose run --rm --no-deps dev cargo run -p airc -- version

      - name: Build airc release image
        run: docker compose build airc-rs
