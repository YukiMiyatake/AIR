name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify repository layout
        run: |
          test -f README.md
          test -f .gitignore
          echo CI scaffold OK

      - name: Placeholder checks
        run: echo No build targets yet - scaffold pass
