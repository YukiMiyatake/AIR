name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: Test (Rust primary)
        run: cargo test --workspace

      - name: CLI smoke (Rust)
        run: |
          set +e
          cargo run -q -p airc -- run examples/sum.air
          code=$?
          set -e
          test "$code" -eq 55
          set +e
          cargo run -q -p airc -- check examples/bad_move.air
          code=$?
          set -e
          test "$code" -ne 0
          out=$(cargo run -q -p airc -- run examples/hello.air)
          printf '%s\n' "$out" | head -n1 | grep -qx 'hello'
          cargo run -q -p airc -- compile examples/sum.air | grep -F 'jit main => 55'
          cargo run -q -p airc -- compile examples/sum.air -o /tmp/airc-sum-ci
          set +e
          /tmp/airc-sum-ci
          code=$?
          set -e
          test "$code" -eq 55
          rm -f /tmp/airc-sum-ci
          cargo run -q -p airc -- compile examples/sum.air --freestanding -o /tmp/airc-sum-free
          set +e
          /tmp/airc-sum-free
          code=$?
          set -e
          test "$code" -eq 55
          rm -f /tmp/airc-sum-free
          cargo run -q -p airc -- compile examples/hello.air -o /tmp/airc-hello-ci
          out=$(/tmp/airc-hello-ci)
          test "$out" = "hello"
          rm -f /tmp/airc-hello-ci
          cargo run -q -p airc -- compile examples/add.air | grep -F 'jit main => 42'

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (TS oracle)
        run: npm ci

      - name: Build (TS oracle)
        run: npm run build

      - name: Test (TS oracle)
        run: npm test

      - name: CLI smoke (TS oracle)
        run: |
          set +e
          npm run airc -- run examples/sum.air
          code=$?
          set -e
          test "$code" -eq 55
          set +e
          npm run -s airc -- run examples/sum.air.json
          code=$?
          set -e
          test "$code" -eq 55
          set +e
          npm run airc -- check examples/bad_move.air
          code=$?
          set -e
          test "$code" -ne 0
          out=$(npm run -s airc -- run examples/hello.air)
          printf '%s\n' "$out" | head -n1 | grep -qx 'hello'

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose build dev

      - name: Rust version in container
        run: docker compose run --rm --no-deps dev cargo run -p airc -- version

      - name: Build airc release image
        run: docker compose build airc-rs

      - name: airc-rs run sum
        run: |
          set +e
          docker compose run --rm airc-rs run examples/sum.air
          code=$?
          set -e
          test "$code" -eq 55
