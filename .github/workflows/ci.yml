name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install (TS)
        run: npm ci

      - name: Build (TS)
        run: npm run build

      - name: Test (TS)
        run: npm test

      - name: CLI smoke (TS)
        run: npm run airc -- run examples/sum.air.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"

      - name: Test (Rust)
        run: cargo test --workspace

      - name: CLI smoke (Rust)
        run: cargo run -p airc -- version

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose build dev

      - name: Rust version in container
        run: docker compose run --rm --no-deps dev cargo run -p airc -- version

      - name: Build airc release image
        run: docker compose build airc-rs
